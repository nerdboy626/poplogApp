name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            poplog-app/package-lock.json
            server/package-lock.json

      - name: Install Root Dependencies
        run: npm ci

      - name: Debug Environment
        run: |
          node -v
          npm -v
          pwd
          ls -la
          ls -la poplog-app
          cat poplog-app/package.json
          head -20 poplog-app/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: poplog-app
        run: npm ci

      - name: Install Backend Dependencies
        working-directory: server
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Build Frontend
        run: npm run build
